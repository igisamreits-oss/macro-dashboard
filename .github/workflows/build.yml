name: Build & Deploy Dashboard

on:
  # 매일 00:00 UTC = 09:00 KST 자동 실행
  schedule:
    - cron: '0 0 * * *'
  # main 브랜치 푸시 시 즉시 빌드
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'templates/**'
      - 'data/**'
      - '.github/workflows/build.yml'
  # 수동 실행 (Actions 탭 → Run workflow)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_fred.py

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fred/latest.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily dashboard refresh ($(date -u +%Y-%m-%d))"
            git push
          fi
